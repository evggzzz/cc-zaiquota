<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240" fill="none" role="img" aria-label="cc-zaiquota">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2ea043"/><stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="y" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b08800"/><stop offset="1" stop-color="#d29922"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="240" rx="22" fill="url(#bg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- two stacked quota bars (5h + weekly) -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" text-rendering="geometricPrecision">
    <!-- 5h row -->
    <text x="70" y="98" font-size="20" font-weight="700" fill="#8b949e">5h</text>
    <g filter="url(#glow)">
      <rect x="112" y="80" width="24" height="22" rx="4" fill="url(#y)"/>
      <rect x="139" y="80" width="24" height="22" rx="4" fill="url(#y)"/>
      <rect x="166" y="80" width="24" height="22" rx="4" fill="url(#y)"/>
      <rect x="193" y="80" width="24" height="22" rx="4" fill="url(#y)"/>
      <rect x="220" y="80" width="24" height="22" rx="4" fill="url(#y)"/>
    </g>
    <rect x="247" y="80" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="274" y="80" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="301" y="80" width="24" height="22" rx="4" fill="#21262d"/>
    <text x="335" y="98" font-size="16" font-weight="600" fill="#d29922">56%</text>

    <!-- weekly row -->
    <text x="70" y="158" font-size="20" font-weight="700" fill="#8b949e">wk</text>
    <g filter="url(#glow)">
      <rect x="112" y="140" width="24" height="22" rx="4" fill="url(#g)"/>
    </g>
    <rect x="139" y="140" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="166" y="140" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="193" y="140" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="220" y="140" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="247" y="140" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="274" y="140" width="24" height="22" rx="4" fill="#21262d"/>
    <rect x="301" y="140" width="24" height="22" rx="4" fill="#21262d"/>
    <text x="335" y="158" font-size="16" font-weight="600" fill="#3fb950">15%</text>
  </g>

  <!-- divider -->
  <line x1="395" y1="60" x2="395" y2="180" stroke="#21262d" stroke-width="1.5"/>

  <!-- wordmark -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" text-rendering="geometricPrecision">
    <text x="425" y="118" font-size="60" font-weight="800">
      <tspan fill="#3fb950">cc</tspan><tspan fill="#f0f6fc">-zaiquota</tspan>
    </text>
    <text x="427" y="155" font-size="21" font-weight="500" fill="#8b949e">
      z.ai Coding Plan quota in your Claude Code statusline
    </text>
    <text x="427" y="183" font-size="16" font-weight="500" fill="#6e7681">
      5h + weekly windows · ban-safe · composes with cc-contextbar
    </text>
  </g>
</svg>
